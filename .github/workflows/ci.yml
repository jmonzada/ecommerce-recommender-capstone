name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint/test dependencies
        run: pip install ruff pytest
      - name: Lint
        run: ruff check src tests app
      - name: Test
        run: pytest tests -q

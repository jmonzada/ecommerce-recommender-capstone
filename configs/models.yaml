# Step 4 model configuration (config-driven runs; notebook 03 reads this).
candidate_generation:
  svd_components: [16, 32, 64, 128]   # swept on validation users
  hybrid_weights: [0.25, 0.5, 0.75]   # CF share of the z-normalised blend
  n_candidates: 50                    # Stage-1 list length fed to the ranker
  val_share: 0.3                      # repeat buyers held aside for tuning w / k
negative_sampling:
  ratio: 4          # negatives per positive
  hard_share: 0.5   # half from Stage-1 candidate lists, half uniform random
  seed: 42
rankers:
  logistic_regression:
    C: [0.01, 0.1, 1.0]
    class_weight: [null, balanced]
  random_forest:
    n_estimators: [300]
    max_depth: [8, 16, null]
    min_samples_leaf: [5]
  xgboost:
    n_iter: 12
    param_distributions:
      max_depth: [4, 6, 8]
      learning_rate: [0.03, 0.1, 0.2]
      n_estimators: [200, 400]
      subsample: [0.7, 0.9, 1.0]
      colsample_bytree: [0.7, 1.0]
      scale_pos_weight: [1, 2, 4]
cv_folds: 3
